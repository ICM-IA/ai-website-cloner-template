<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle (light) -->
  <circle cx="100" cy="100" r="98" fill="white"/>

  <!-- 5 spokes evenly spaced at 72° starting from top -->
  <line x1="100" y1="100" x2="100" y2="28"  stroke="#111111" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="168" y2="78"  stroke="#111111" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="142" y2="158" stroke="#111111" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="58"  y2="158" stroke="#111111" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="32"  y2="78"  stroke="#111111" stroke-width="9" stroke-linecap="round"/>

  <!-- End nodes -->
  <circle cx="100" cy="28"  r="12" fill="#111111"/>
  <circle cx="168" cy="78"  r="12" fill="#111111"/>
  <circle cx="142" cy="158" r="12" fill="#111111"/>
  <circle cx="58"  cy="158" r="12" fill="#111111"/>
  <circle cx="32"  cy="78"  r="12" fill="#111111"/>

  <!-- Center red sphere with 3D gradient -->
  <radialGradient id="redSphere" cx="35%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ff6666"/>
    <stop offset="50%" stop-color="#FF1414"/>
    <stop offset="100%" stop-color="#7a0000"/>
  </radialGradient>
  <circle cx="100" cy="100" r="30" fill="url(#redSphere)"/>

  <!-- Specular highlight -->
  <ellipse cx="91" cy="90" rx="9" ry="6" fill="rgba(255,255,255,0.3)" transform="rotate(-20 91 90)"/>
</svg>
