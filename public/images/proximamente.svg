<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d0d1a"/>
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="rgba(201,146,42,0.2)" stroke-width="2"/>

  <!-- Camera icon -->
  <g transform="translate(400, 200)">
    <rect x="-40" y="-28" width="80" height="56" rx="8" fill="none" stroke="rgba(201,146,42,0.4)" stroke-width="2.5"/>
