    <circle cx="0" cy="0" r="7" fill="rgba(201,146,42,0.3)"/>
    <rect x="-12" y="-36" width="24" height="10" rx="3" fill="none" stroke="rgba(201,146,42,0.4)" stroke-width="2.5"/>
    <circle cx="28" cy="-18" r="4" fill="rgba(201,146,42,0.4)"/>
  </g>

  <!-- Text -->
  <text x="400" y="295" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="rgba(239,239,239,0.6)" text-anchor="middle" letter-spacing="3">FOTOS PRÓXIMAMENTE</text>
