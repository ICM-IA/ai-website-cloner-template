<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#000000"/>

  <!-- 5 spokes evenly spaced at 72° starting from top -->
  <line x1="100" y1="100" x2="100" y2="34"  stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="162" y2="81"  stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="139" y2="155" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="61"  y2="155" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="100" y1="100" x2="38"  y2="81"  stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- End nodes -->
  <circle cx="100" cy="34"  r="11" fill="white"/>
  <circle cx="162" cy="81"  r="11" fill="white"/>
  <circle cx="139" cy="155" r="11" fill="white"/>
  <circle cx="61"  cy="155" r="11" fill="white"/>
  <circle cx="38"  cy="81"  r="11" fill="white"/>

  <!-- Center red sphere -->
  <radialGradient id="s" cx="35%" cy="32%" r="58%">
    <stop offset="0%" stop-color="#ff6666"/>
    <stop offset="50%" stop-color="#FF1414"/>
    <stop offset="100%" stop-color="#7a0000"/>
  </radialGradient>
  <circle cx="100" cy="100" r="28" fill="url(#s)"/>
</svg>
